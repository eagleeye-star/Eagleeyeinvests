<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in — EagleEyE</title>
<link rel="stylesheet" href="style.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("ee_theme")||"dark");</script>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:100%;max-width:380px;text-align:center;}
.logo{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:28px;}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(150deg,#E8C158,#C8952A);display:flex;align-items:center;justify-content:center;}
.spinner{width:42px;height:42px;border:3px solid var(--border);border-top-color:#E8C158;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.title{font-family:var(--font-display);font-size:20px;font-weight:600;margin-bottom:8px;}
.sub{font-size:13px;color:var(--text-dim);line-height:1.6;}
.err{background:var(--red-fill);border:1px solid rgba(217,89,76,0.3);color:var(--red);padding:12px 14px;border-radius:8px;font-size:12.5px;margin-top:16px;display:none;text-align:left;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" width="21" height="21">
        <path d="M12 3C7 5 4 9 2 12c2 3 5 7 10 9 5-2 8-6 10-9-2-3-5-7-10-9z" stroke="#1A1300" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" fill="#1A1300"/>
      </svg>
    </div>
    <div style="font-family:var(--font-display);font-size:19px;font-weight:600;">EagleEyE</div>
  </div>
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Signing you in…</div>
  <div class="sub" id="sub">Please wait while we verify your Google account.</div>
  <div class="err" id="err"></div>
  <a href="login.html" style="display:none;margin-top:16px;" class="btn btn-ghost" id="retry">← Try again</a>
</div>

<script>
// Self-contained — no external dependencies to avoid variable conflicts
(function(){
  var SB_URL  = 'https://jyhamtniuhlsbwcdfspa.supabase.co';
  var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5aGFtdG5pdWhsc2J3Y2Rmc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjE1MTgsImV4cCI6MjA5NzczNzUxOH0.1nT-wpRjjAIpgUk_BDTlu3z4Cvuz_G0nKX9l65cwpF0';

  function showErr(msg){
    document.getElementById('spinner').style.display='none';
    document.getElementById('title').textContent='Sign in failed';
    document.getElementById('sub').textContent='There was a problem signing you in.';
    var e=document.getElementById('err');
    e.textContent=msg;
    e.style.display='block';
    document.getElementById('retry').style.display='inline-block';
    console.error('Auth callback error:', msg);
  }

  function setStatus(msg){ document.getElementById('sub').textContent=msg; }

  async function run(){
    // Parse tokens from URL hash
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var access_token  = params.get('access_token');
    var refresh_token = params.get('refresh_token') || '';
    var error         = params.get('error');
    var error_desc    = params.get('error_description');

    if(error){ showErr(error_desc || error); return; }
    if(!access_token){ showErr('No access token in URL. Please try signing in again.'); return; }

    try{
      // Step 1: Get user
      setStatus('Verifying your account…');
      var userRes = await fetch(SB_URL+'/auth/v1/user', {
        headers:{ 'apikey': SB_ANON, 'Authorization': 'Bearer '+access_token }
      });
      if(!userRes.ok){
        var errText = await userRes.text();
        showErr('Failed to verify account ('+userRes.status+'): '+errText.substring(0,120));
        return;
      }
      var user = await userRes.json();
      if(!user || !user.id){ showErr('No user data returned. Please try again.'); return; }

      // Step 2: Get profile
      setStatus('Loading your profile…');
      var profRes = await fetch(SB_URL+'/rest/v1/profiles?id=eq.'+user.id+'&select=*', {
        headers:{ 'apikey': SB_ANON, 'Authorization': 'Bearer '+access_token }
      });
      var profiles = profRes.ok ? await profRes.json() : [];
      var profile = profiles[0] || null;

      // Step 3: Create profile if new user
      if(!profile){
        setStatus('Setting up your account…');
        var meta = user.user_metadata || {};
        var firstName = meta.given_name || (meta.full_name||'').split(' ')[0] || 'User';
        var lastName  = meta.family_name || (meta.full_name||'').split(' ').slice(1).join(' ') || '';
        var trialEnd  = new Date(Date.now() + 14*24*60*60*1000).toISOString();

        var createRes = await fetch(SB_URL+'/rest/v1/profiles', {
          method: 'POST',
          headers:{
            'Content-Type': 'application/json',
            'apikey': SB_ANON,
            'Authorization': 'Bearer '+access_token,
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            id: user.id,
            first_name: firstName,
            last_name: lastName,
            plan: 'free',
            trial_ends_at: trialEnd
          })
        });

        if(createRes.ok){
          var created = await createRes.json();
          profile = created[0] || { first_name: firstName, last_name: lastName, plan: 'free', trial_ends_at: trialEnd };
        } else {
          // Profile may already exist — use basic data from Google
          profile = { first_name: firstName, last_name: lastName, plan: 'free', trial_ends_at: null };
        }
      }

      // Step 4: Save session to localStorage
      localStorage.setItem('ee_access_token',  access_token);
      localStorage.setItem('ee_refresh_token', refresh_token);
      localStorage.setItem('ee_user',    JSON.stringify({ id: user.id, email: user.email }));
      localStorage.setItem('ee_profile', JSON.stringify({
        firstName:   profile.first_name  || 'User',
        lastName:    profile.last_name   || '',
        plan:        profile.plan        || 'free',
        trialEndsAt: profile.trial_ends_at || null
      }));
      localStorage.setItem('ee_token_expires', String(Date.now() + 55*60*1000));

      // Step 5: Redirect
      document.getElementById('spinner').style.display='none';
      document.getElementById('title').textContent = 'Welcome, '+(profile.first_name||'')+'!';
      setStatus('Redirecting to your dashboard…');
      setTimeout(function(){ window.location.href = 'dashboard.html'; }, 1200);

    } catch(err){
      showErr('Unexpected error: '+err.message);
    }
  }

  run();
})();
</script>
</body>
</html>
