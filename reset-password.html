<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — EagleEyE</title>
<link rel="stylesheet" href="style.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("ee_theme")||"dark");</script>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:100%;max-width:400px;}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:28px;}
.logo-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(150deg,#E8C158,#C8952A);display:flex;align-items:center;justify-content:center;}
.auth-title{font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:16px;}
.field label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--panel-2);color:var(--text);font-family:var(--font-body);box-sizing:border-box;}
.field input:focus{outline:none;border-color:var(--gold-dim);}
.submit-btn{width:100%;padding:11px;background:var(--gold-bright);color:#1A1300;border:none;border-radius:var(--radius-sm);font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--font-body);margin-top:4px;}
.submit-btn:hover{background:var(--gold-hover);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
.alert-box{padding:10px 12px;border-radius:var(--radius-sm);font-size:12.5px;margin-bottom:14px;display:none;line-height:1.5;}
.alert-box.show{display:block;}
.alert-success{background:var(--green-fill);color:var(--green-bright);border:1px solid rgba(45,201,141,0.2);}
.alert-error{background:var(--red-fill);color:var(--red);border:1px solid rgba(217,89,76,0.2);}
.strength-bar{height:3px;border-radius:2px;margin-top:5px;transition:width .3s,background .3s;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M12 3C7 5 4 9 2 12c2 3 5 7 10 9 5-2 8-6 10-9-2-3-5-7-10-9z" stroke="#1A1300" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" fill="#1A1300"/>
      </svg>
    </div>
    <div style="font-family:var(--font-display);font-size:18px;font-weight:600;">EagleEyE</div>
  </div>

  <!-- Step 1: Request reset email -->
  <div id="step-request">
    <div class="auth-title">Reset your password</div>
    <div class="auth-sub">Enter your email and we'll send you a link to reset your password.</div>
    <div class="alert-box alert-error" id="req-err"></div>
    <div class="alert-box alert-success" id="req-ok"></div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="req-email" placeholder="you@example.com" autofocus>
    </div>
    <button class="submit-btn" onclick="requestReset()">Send reset link</button>
    <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-dim);">
      Remember your password? <a href="login.html" style="color:var(--gold-bright);">Log in</a>
    </div>
  </div>

  <!-- Step 2: Set new password (shown when access_token is in URL hash) -->
  <div id="step-newpass" style="display:none;">
    <div class="auth-title">Set new password</div>
    <div class="auth-sub">Choose a strong password for your EagleEyE account.</div>
    <div class="alert-box alert-error" id="np-err"></div>
    <div class="alert-box alert-success" id="np-ok"></div>
    <div class="field">
      <label>New password</label>
      <input type="password" id="np-pass" placeholder="At least 8 characters" oninput="checkStrength()">
      <div class="strength-bar" id="strength-bar" style="width:0%;background:var(--red);"></div>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="np-confirm" placeholder="Repeat your new password">
    </div>
    <button class="submit-btn" onclick="setNewPassword()">Update password</button>
  </div>
</div>

<script>
const SB_URL  = 'https://jyhamtniuhlsbwcdfspa.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5aGFtdG5pdWhsc2J3Y2Rmc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjE1MTgsImV4cCI6MjA5NzczNzUxOH0.1nT-wpRjjAIpgUk_BDTlu3z4Cvuz_G0nKX9l65cwpF0';

// Check if we have a recovery token in the URL hash
(function(){
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const type = params.get('type');
  const token = params.get('access_token');
  if(type === 'recovery' && token){
    // Store token for use when setting new password
    window._resetToken = token;
    document.getElementById('step-request').style.display = 'none';
    document.getElementById('step-newpass').style.display = 'block';
  }
})();

function showErr(id, msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function showOk(id, msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function hideAll(...ids){ ids.forEach(id=>{ const e=document.getElementById(id); e.classList.remove('show'); }); }

async function requestReset(){
  const email = document.getElementById('req-email').value.trim();
  hideAll('req-err','req-ok');
  if(!email){ showErr('req-err','Please enter your email address.'); return; }

  const btn = document.querySelector('#step-request .submit-btn');
  btn.disabled=true; btn.textContent='Sending…';

  try{
    const res = await fetch(`${SB_URL}/auth/v1/recover`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_ANON},
      body: JSON.stringify({ email, redirect_to: 'https://eagleeyeinvests.com/reset-password.html' }),
    });
    if(res.ok || res.status === 200){
      showOk('req-ok', '✓ Reset link sent! Check your inbox (and spam folder). The link expires in 1 hour.');
      btn.textContent = 'Email sent ✓';
    } else {
      const d = await res.json().catch(()=>({}));
      showErr('req-err', d.error_description || d.msg || 'Could not send reset email. Please try again.');
      btn.disabled=false; btn.textContent='Send reset link';
    }
  }catch(e){
    showErr('req-err','Network error. Please check your connection.');
    btn.disabled=false; btn.textContent='Send reset link';
  }
}

function checkStrength(){
  const p = document.getElementById('np-pass').value;
  const bar = document.getElementById('strength-bar');
  let score = 0;
  if(p.length >= 8)  score++;
  if(/[A-Z]/.test(p)) score++;
  if(/[0-9]/.test(p)) score++;
  if(/[^A-Za-z0-9]/.test(p)) score++;
  const colors = ['var(--red)','var(--red)','var(--amber,#E8A020)','var(--gold-bright)','var(--green-bright)'];
  bar.style.width = (score/4*100)+'%';
  bar.style.background = colors[score];
}

async function setNewPassword(){
  const pass    = document.getElementById('np-pass').value;
  const confirm = document.getElementById('np-confirm').value;
  hideAll('np-err','np-ok');

  if(pass.length < 8){ showErr('np-err','Password must be at least 8 characters.'); return; }
  if(pass !== confirm){ showErr('np-err','Passwords do not match.'); return; }

  const btn = document.querySelector('#step-newpass .submit-btn');
  btn.disabled=true; btn.textContent='Updating…';

  try{
    const res = await fetch(`${SB_URL}/auth/v1/user`, {
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'apikey': SB_ANON,
        'Authorization': `Bearer ${window._resetToken}`,
      },
      body: JSON.stringify({ password: pass }),
    });
    if(res.ok){
      showOk('np-ok','✓ Password updated successfully! Redirecting to login…');
      btn.textContent='Done ✓';
      setTimeout(()=>{ window.location.href='login.html'; }, 2000);
    } else {
      const d = await res.json().catch(()=>({}));
      showErr('np-err', d.error_description || d.msg || 'Could not update password. The link may have expired.');
      btn.disabled=false; btn.textContent='Update password';
    }
  }catch(e){
    showErr('np-err','Network error. Please try again.');
    btn.disabled=false; btn.textContent='Update password';
  }
}

document.getElementById('req-email').addEventListener('keydown', e=>{ if(e.key==='Enter') requestReset(); });
document.getElementById('np-confirm') && document.getElementById('np-confirm').addEventListener('keydown', e=>{ if(e.key==='Enter') setNewPassword(); });
</script>
</body>
</html>
