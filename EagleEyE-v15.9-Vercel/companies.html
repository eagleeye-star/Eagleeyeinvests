<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D4A537">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EagleEyE">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Listed Companies — EagleEyE</title>
<link rel="stylesheet" href="style.css">
<style>
.company-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.company-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .15s;}
.company-card:hover{border-color:var(--gold-dim);}
.company-card .header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.company-card .tk{font-size:16px;font-weight:700;letter-spacing:0.01em;}
.company-card .price{font-family:var(--font-mono);font-size:14px;font-weight:600;text-align:right;}
.company-card .name{font-size:12.5px;color:var(--text-dim);margin-bottom:10px;line-height:1.4;}
.company-card .sector-badge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:10px;font-family:var(--font-body);margin-bottom:10px;}
.company-card .links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-soft);}
.company-link{font-size:11.5px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);color:var(--text-dim);text-decoration:none;transition:all .12s;}
.company-link:hover{border-color:var(--gold-dim);color:var(--gold-bright);}
.company-link.official{background:var(--gold-glow);border-color:rgba(212,165,55,0.3);color:var(--gold-bright);}
.company-link.official:hover{background:rgba(212,165,55,0.2);}
.in-portfolio{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:var(--green-fill);color:var(--green-bright);font-family:var(--font-mono);margin-left:6px;vertical-align:middle;}
@media(max-width:900px){.company-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.company-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="chrome-header"></div>
<div class="wrap">
  <div style="margin:28px 0 20px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;">
    <div>
      <div style="font-family:var(--font-display);font-size:26px;font-weight:600;">Listed Companies</div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">All 38 companies listed on the Ghana Stock Exchange with official websites</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <input class="screener-search" id="co-search" placeholder="Search company or ticker…" oninput="filterCompanies()" style="width:220px;">
      <select class="screener-search" id="co-sector" onchange="filterCompanies()" style="width:160px;"></select>
    </div>
  </div>

  <div class="company-grid" id="company-grid"></div>
</div>
<div id="chrome-footer"></div>

<script src="data.js"></script>
<script>
mountChrome('companies.html');

// Official websites for all GSE listed companies
const companyData = {
  ACC:       { website:'https://www.accessbankplc.com/ghana', ir:'https://www.accessbankplc.com/investor-relations' },
  ADB:       { website:'https://www.adb.com.gh', ir:'https://www.adb.com.gh/investor-relations' },
  ALLGH:     { website:'https://www.aluworks.com.gh', ir:null },
  AGA:       { website:'https://www.anglogoldashanti.com', ir:'https://www.anglogoldashanti.com/investors/' },
  BOPP:      { website:'https://www.bensooilpalm.com', ir:null },
  CAL:       { website:'https://www.calbank.net', ir:'https://www.calbank.net/investor-relations' },
  CMLT:      { website:'https://www.camelotghana.com', ir:null },
  CLYD:      { website:null, ir:null },
  CPC:       { website:'https://www.cocoaprocessing.com.gh', ir:null },
  DASPHARMA: { website:'https://www.dannexayrtonstarwin.com', ir:null },
  EGH:       { website:'https://www.ecobank.com/ghana', ir:'https://www.ecobank.com/ghana/investor-relations' },
  ETI:       { website:'https://www.ecobank.com', ir:'https://www.ecobank.com/investor-relations' },
  EGL:       { website:'https://www.enterprisegroup.com.gh', ir:'https://www.enterprisegroup.com.gh/investor-relations' },
  FML:       { website:'https://www.fanmilk.com', ir:null },
  FAB:       { website:'https://www.firstatlantic.com.gh', ir:'https://www.firstatlantic.com.gh/investor-relations' },
  GCB:       { website:'https://www.gcbbank.com.gh', ir:'https://www.gcbbank.com.gh/investor-relations' },
  GOIL:      { website:'https://www.goilcompany.com', ir:'https://www.goilcompany.com/investor-relations' },
  GLD:       { website:'https://www.goldfields.com', ir:'https://www.goldfields.com/investors/' },
  GGBL:      { website:'https://www.guinnessghana.com.gh', ir:'https://www.guinnessghana.com.gh/investor-relations' },
  HORDS:     { website:null, ir:null },
  IIL:       { website:'https://www.intravenousinfusions.com', ir:null },
  KASAPREKO: { website:'https://www.kasapreko.com', ir:'https://www.kasapreko.com/investor-relations' },
  MAC:       { website:'https://www.mechanicalloyd.com.gh', ir:null },
  MMH:       { website:null, ir:null },
  MTNGH:     { website:'https://www.mtn.com.gh', ir:'https://www.mtn.com.gh/investor-relations' },
  RBGH:      { website:'https://www.republicbankghana.com', ir:'https://www.republicbankghana.com/investor-relations' },
  SAMBA:     { website:null, ir:null },
  SIC:       { website:'https://www.sicghana.com', ir:'https://www.sicghana.com/investor-relations' },
  SOGEGH:    { website:'https://www.societegenerale.com.gh', ir:'https://www.societegenerale.com.gh/investor-relations' },
  SCB:       { website:'https://www.sc.com/gh', ir:'https://www.sc.com/gh/investor-relations' },
  TOTAL:     { website:'https://totalenergies.com.gh', ir:'https://totalenergies.com.gh/investor-relations' },
  UNIL:      { website:'https://www.unilever.com.gh', ir:'https://www.unilever.com.gh/investor-relations' },
  UTB:       { website:null, ir:null },
  ZEN:       { website:'https://www.zenpetroleum.com', ir:null },
  PBC:       { website:'https://www.pbcghana.com', ir:null },
  DIGICUT:   { website:null, ir:null },
  MEGA:      { website:'https://www.megaafricancapital.com', ir:null },
  MMH2:      { website:null, ir:null },
};

const myTickers = new Set(
  JSON.parse(localStorage.getItem('ee_access_token') ? '[]' : '[]')
);

// Populate sector filter
const sectors = [...new Set(gseStocks.map(s=>s.sector))].sort();
const secSel = document.getElementById('co-sector');
secSel.innerHTML = '<option value="">All sectors</option>';
sectors.forEach(s=>secSel.innerHTML+=`<option value="${s}">${s}</option>`);

function renderCompanies(stocks){
  const grid = document.getElementById('company-grid');
  grid.innerHTML='';
  if(stocks.length===0){
    grid.innerHTML='<div class="panel" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);">No companies found.</div>';
    return;
  }
  stocks.forEach(s=>{
    const co = companyData[s.ticker]||{};
    const up=s.chg>0, flat=s.chg===0;
    const sectorColor = secColors[s.sector]||'#5A5D57';
    grid.innerHTML+=`<div class="company-card">
      <div class="header">
        <div>
          <div class="tk">${s.ticker}</div>
          <div class="name">${s.name}</div>
        </div>
        <div>
          <div class="price">GH₵${fmt(s.price,2)}</div>
          <div style="text-align:right;margin-top:3px;">
            <span class="chip ${up?'chip-up':flat?'chip-neu':'chip-down'}" style="font-size:10.5px;">${up?'+':''}${flat?'—':fmt(s.chg,2)+'%'}</span>
          </div>
        </div>
      </div>
      <span class="sector-badge" style="background:${sectorColor}22;color:${sectorColor};">${s.sector}</span>
      <div style="font-size:11.5px;color:var(--text-faint);">Mkt cap: ${s.mktCap}</div>
      <div class="links">
        ${co.website?`<a href="${co.website}" class="company-link official" target="_blank" rel="noopener">🌐 Official site</a>`:'<span style="font-size:11px;color:var(--text-faint);">No website listed</span>'}
        ${co.ir?`<a href="${co.ir}" class="company-link" target="_blank" rel="noopener">📊 Investor relations</a>`:''}
        <a href="https://gse.com.gh/listed-companies/" class="company-link" target="_blank" rel="noopener">GSE profile</a>
      </div>
    </div>`;
  });
}

function filterCompanies(){
  const q=(document.getElementById('co-search').value||'').toLowerCase();
  const sec=document.getElementById('co-sector').value;
  renderCompanies(gseStocks.filter(s=>{
    if(q&&!s.ticker.toLowerCase().includes(q)&&!s.name.toLowerCase().includes(q)) return false;
    if(sec&&s.sector!==sec) return false;
    return true;
  }));
}

// Initial render with static data, then update with live prices
renderCompanies(gseStocks);
loadLiveData(()=>renderCompanies(gseStocks));
</script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/sw.js')
          .then(r=>console.log('[PWA] SW registered:', r.scope))
          .catch(e=>console.log('[PWA] SW error:', e));
      });
    }
  </script>
</body></html>
