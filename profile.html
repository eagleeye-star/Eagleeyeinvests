<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — EagleEyE</title>
<link rel="stylesheet" href="style.css">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("ee_theme")||"dark");</script>
<style>
.profile-wrap{max-width:680px;margin:0 auto;padding:28px 24px 60px;}
.profile-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px;}
.profile-card .card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.profile-card .card-title{font-size:14px;font-weight:600;}
.profile-card .card-body{padding:20px;}
.field{margin-bottom:16px;}
.field label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--panel-2);color:var(--text);font-family:var(--font-body);box-sizing:border-box;}
.field input:focus{outline:none;border-color:var(--gold-dim);}
.field input:disabled{opacity:0.5;cursor:not-allowed;}
.field .hint{font-size:11px;color:var(--text-faint);margin-top:4px;}
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(150deg,var(--gold-dim),var(--gold-bright));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#1A1300;font-family:var(--font-display);flex-shrink:0;}
.plan-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.plan-premium{background:var(--gold-glow);color:var(--gold-bright);border:1px solid rgba(212,165,55,0.3);}
.plan-free{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--border);}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0;}
.stat-box{background:var(--panel-2);border-radius:var(--radius-sm);padding:14px;text-align:center;}
.stat-box .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
.stat-box .val{font-size:18px;font-weight:700;font-family:var(--font-display);}
</style>
</head>
<body>
<div id="chrome-header"></div>

<div class="profile-wrap">
  <div style="margin-bottom:24px;">
    <div style="font-family:var(--font-display);font-size:26px;font-weight:600;">My Profile</div>
    <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">Manage your account settings</div>
  </div>

  <!-- Account overview -->
  <div class="profile-card">
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px;">
        <div class="avatar" id="avatar-init">—</div>
        <div>
          <div style="font-size:18px;font-weight:600;" id="profile-name">Loading…</div>
          <div style="font-size:13px;color:var(--text-dim);margin-top:3px;" id="profile-email"></div>
          <div style="margin-top:8px;" id="profile-plan"></div>
        </div>
      </div>
      <div class="stat-row" id="profile-stats"></div>
    </div>
  </div>

  <!-- Edit profile -->
  <div class="profile-card">
    <div class="card-head">
      <div class="card-title">Personal information</div>
    </div>
    <div class="card-body">
      <div class="alert-box alert-success" id="profile-ok"></div>
      <div class="alert-box alert-error" id="profile-err"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="field">
          <label>First name</label>
          <input type="text" id="p-firstname" placeholder="Gilbert">
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="p-lastname" placeholder="Prah">
        </div>
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="p-email" disabled>
        <div class="hint">Email cannot be changed here. Contact support to update.</div>
      </div>
      <div class="field">
        <label>Phone number</label>
        <input type="tel" id="p-phone" placeholder="+233 xx xxx xxxx">
      </div>
      <div class="field">
        <label>Portfolio goal (GH₵)</label>
        <input type="number" id="p-goal" placeholder="1000000" min="0" step="1000">
        <div class="hint">This is your wealth target shown on the dashboard goal tracker.</div>
      </div>
      <button class="btn btn-gold" onclick="saveProfile()" style="width:100%;margin-top:4px;">Save changes</button>
    </div>
  </div>

  <!-- Change password -->
  <div class="profile-card">
    <div class="card-head">
      <div class="card-title">Change password</div>
    </div>
    <div class="card-body">
      <div class="alert-box alert-success" id="pass-ok"></div>
      <div class="alert-box alert-error" id="pass-err"></div>
      <div class="field">
        <label>New password</label>
        <input type="password" id="p-newpass" placeholder="At least 8 characters">
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input type="password" id="p-confirmpass" placeholder="Repeat new password">
      </div>
      <button class="btn btn-ghost" onclick="changePassword()" style="width:100%;">Update password</button>
    </div>
  </div>

  <!-- Danger zone -->
  <div class="profile-card" style="border-color:rgba(217,89,76,0.2);">
    <div class="card-head">
      <div class="card-title" style="color:var(--red);">Account</div>
    </div>
    <div class="card-body">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
          <div style="font-size:13px;font-weight:500;">Sign out</div>
          <div style="font-size:12px;color:var(--text-faint);margin-top:3px;">You'll need to log in again to access your portfolio.</div>
        </div>
        <button class="btn btn-ghost" onclick="EE_AUTH.logout()" style="border-color:rgba(217,89,76,0.3);color:var(--red);">Sign out</button>
      </div>
    </div>
  </div>
</div>

<div id="chrome-footer"></div>
<script src="auth.js"></script>
<script src="auth-guard.js"></script>
<script src="data.js"></script>
<script>
mountChrome('profile.html');

const SB_URL  = 'https://jyhamtniuhlsbwcdfspa.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5aGFtdG5pdWhsc2J3Y2Rmc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjE1MTgsImV4cCI6MjA5NzczNzUxOH0.1nT-wpRjjAIpgUk_BDTlu3z4Cvuz_G0nKX9l65cwpF0';

function showAlert(id, msg, type='ok'){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 4000);
}

async function loadProfile(){
  const token = localStorage.getItem('ee_access_token');
  const user  = JSON.parse(localStorage.getItem('ee_user')||'null');
  const prof  = JSON.parse(localStorage.getItem('ee_profile')||'null');
  if(!token || !user) return;

  // Set avatar initials
  const name = (prof?.firstName||'?')[0] + (prof?.lastName||'')[0];
  document.getElementById('avatar-init').textContent = name.toUpperCase();
  document.getElementById('profile-name').textContent = (prof?.firstName||'') + ' ' + (prof?.lastName||'');
  document.getElementById('profile-email').textContent = user.email||'';

  // Plan badge
  const isPrem = prof?.plan === 'premium';
  document.getElementById('profile-plan').innerHTML = isPrem
    ? '<span class="plan-tag plan-premium">⭑ Premium</span>'
    : '<span class="plan-tag plan-free">Free plan</span>';

  // Pre-fill form
  document.getElementById('p-firstname').value = prof?.firstName||'';
  document.getElementById('p-lastname').value  = prof?.lastName||'';
  document.getElementById('p-email').value     = user.email||'';

  // Load full profile from Supabase for phone and goal
  try{
    const res = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${user.id}&select=*`, {
      headers:{ 'apikey':SB_ANON, 'Authorization':`Bearer ${token}` }
    });
    const data = await res.json();
    const dbProf = data[0]||{};
    document.getElementById('p-phone').value = dbProf.phone||'';
    document.getElementById('p-goal').value  = dbProf.goal||'';

    // Stats
    const holdings = JSON.parse(localStorage.getItem('ee_holdings')||'[]');
    const trialEnd = dbProf.trial_ends_at ? new Date(dbProf.trial_ends_at) : null;
    const trialLeft = trialEnd ? Math.max(0, Math.ceil((trialEnd-Date.now())/(1000*60*60*24))) : 0;
    const joined = dbProf.created_at ? new Date(dbProf.created_at).toLocaleDateString('en-GH',{month:'short',year:'numeric'}) : '—';

    document.getElementById('profile-stats').innerHTML = `
      <div class="stat-box"><div class="lbl">Member since</div><div class="val" style="font-size:14px;">${joined}</div></div>
      <div class="stat-box"><div class="lbl">Holdings</div><div class="val">${holdings.length||'—'}</div></div>
      <div class="stat-box"><div class="lbl">${isPrem?'Plan':'Trial days left'}</div><div class="val" style="font-size:14px;color:var(--gold-bright);">${isPrem?'Premium':trialLeft+' days'}</div></div>`;
  }catch(e){}
}

async function saveProfile(){
  const token = localStorage.getItem('ee_access_token');
  const user  = JSON.parse(localStorage.getItem('ee_user')||'null');
  if(!token || !user) return;

  const firstName = document.getElementById('p-firstname').value.trim();
  const lastName  = document.getElementById('p-lastname').value.trim();
  const phone     = document.getElementById('p-phone').value.trim();
  const goal      = parseFloat(document.getElementById('p-goal').value)||null;

  if(!firstName){ showAlert('profile-err','First name is required.','err'); return; }

  try{
    const res = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${user.id}`, {
      method:'PATCH',
      headers:{
        'Content-Type':'application/json',
        'apikey': SB_ANON,
        'Authorization': `Bearer ${token}`,
        'Prefer':'return=representation',
      },
      body: JSON.stringify({ first_name:firstName, last_name:lastName, phone:phone||null, goal }),
    });
    if(res.ok){
      // Update localStorage
      const prof = JSON.parse(localStorage.getItem('ee_profile')||'{}');
      prof.firstName = firstName;
      prof.lastName  = lastName;
      if(goal) prof.goal = goal;
      localStorage.setItem('ee_profile', JSON.stringify(prof));
      document.getElementById('profile-name').textContent = firstName + ' ' + lastName;
      document.getElementById('avatar-init').textContent = (firstName[0]+(lastName[0]||'')).toUpperCase();
      showAlert('profile-ok','✓ Profile updated successfully.');
    } else {
      showAlert('profile-err','Could not save changes. Please try again.','err');
    }
  }catch(e){
    showAlert('profile-err','Network error. Please try again.','err');
  }
}

async function changePassword(){
  const token      = localStorage.getItem('ee_access_token');
  const newPass    = document.getElementById('p-newpass').value;
  const confirmPass= document.getElementById('p-confirmpass').value;
  if(newPass.length < 8){ showAlert('pass-err','Password must be at least 8 characters.','err'); return; }
  if(newPass !== confirmPass){ showAlert('pass-err','Passwords do not match.','err'); return; }

  try{
    const res = await fetch(`${SB_URL}/auth/v1/user`, {
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'apikey': SB_ANON,
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ password: newPass }),
    });
    if(res.ok){
      document.getElementById('p-newpass').value = '';
      document.getElementById('p-confirmpass').value = '';
      showAlert('pass-ok','✓ Password updated successfully.');
    } else {
      const d = await res.json().catch(()=>({}));
      showAlert('pass-err', d.error_description||d.msg||'Could not update password.','err');
    }
  }catch(e){
    showAlert('pass-err','Network error. Please try again.','err');
  }
}

loadProfile();
</script>
</body>
</html>
