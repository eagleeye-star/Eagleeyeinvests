<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#D4A537">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EagleEyE">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>News — EagleEyE</title>
<link rel="stylesheet" href="style.css">
<style>
.news-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.news-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .15s;text-decoration:none;display:flex;flex-direction:column;color:var(--text);}
.news-card:hover{border-color:var(--gold-dim);}
.news-card.featured{grid-column:1/-1;flex-direction:row;gap:24px;background:var(--panel-2);}
.news-card.featured .fc-text{flex:1;}
.news-card.featured .fc-icon{width:140px;flex-shrink:0;background:var(--panel-3);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:36px;}
.news-cat{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:10px;background:var(--gold-glow);color:var(--gold-bright);font-family:var(--font-mono);margin-bottom:10px;border:1px solid rgba(212,165,55,0.2);}
.news-card h3{font-size:14px;font-weight:600;line-height:1.45;margin-bottom:8px;letter-spacing:-0.01em;flex:1;}
.news-card.featured h3{font-size:17px;font-family:var(--font-display);}
.news-card p{font-size:12.5px;color:var(--text-dim);line-height:1.6;margin-bottom:12px;}
.news-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-faint);font-family:var(--font-mono);margin-top:auto;padding-top:10px;border-top:1px solid var(--border-soft);}
.source-tag{font-size:10.5px;padding:2px 7px;border-radius:8px;background:var(--panel-3);color:var(--text-dim);}
.sources-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.source-pill{font-size:11.5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text-dim);background:var(--panel);display:flex;align-items:center;gap:5px;}
.source-pill .dot{width:6px;height:6px;border-radius:50%;}
.source-pill.live .dot{background:var(--green-bright);}
.source-pill.offline .dot{background:var(--red);}
.source-pill.live{border-color:rgba(47,201,141,0.25);}
.skeleton{background:linear-gradient(90deg,var(--panel) 25%,var(--panel-2) 50%,var(--panel) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px;}
@keyframes shimmer{to{background-position:-200% 0}}
.stats-row{display:flex;gap:16px;font-size:12px;color:var(--text-faint);margin-bottom:18px;font-family:var(--font-mono);flex-wrap:wrap;}
.stats-row span{color:var(--text-dim);}
@media(max-width:700px){.news-grid{grid-template-columns:1fr;}.news-card.featured{flex-direction:column;}.news-card.featured .fc-icon{width:100%;height:80px;}}
</style>
</head>
<body>
<div id="chrome-header"></div>
<div class="wrap">
  <div style="margin:28px 0 20px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;">
    <div>
      <div style="font-family:var(--font-display);font-size:26px;font-weight:600;">Market News</div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">Ghana financial news from 7 sources — updated every 2 hours</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadNews()" id="refresh-btn">↻ Refresh</button>
  </div>

  <!-- Source status pills -->
  <div class="sources-strip" id="sources-strip">
    <span style="font-size:11.5px;color:var(--text-faint);">Sources:</span>
    <div class="source-pill"><span class="dot" style="background:var(--gold-bright);animation:pulse 1.8s ease-in-out infinite;"></span>Loading…</div>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Category filters -->
  <div class="filter-bar" id="filter-bar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;">
    <button class="filter-chip active" onclick="filterNews('all',this)">All</button>
  </div>

  <!-- News grid (skeletons while loading) -->
  <div class="news-grid" id="news-grid">
    ${[...Array(6)].map(()=>`
    <div class="news-card" style="pointer-events:none;">
      <div class="skeleton" style="width:70px;height:18px;margin-bottom:12px;"></div>
      <div class="skeleton" style="width:100%;height:15px;margin-bottom:6px;"></div>
      <div class="skeleton" style="width:80%;height:15px;margin-bottom:12px;"></div>
      <div class="skeleton" style="width:100%;height:12px;margin-bottom:5px;"></div>
      <div class="skeleton" style="width:90%;height:12px;"></div>
    </div>`).join('')}
  </div>
</div>
<div id="chrome-footer"></div>
<script src="data.js"></script>
<script>
mountChrome('news.html');

let allArticles=[], activeSource='all', activeCat='all';

const SOURCE_ICONS = {
  'Ghana Stock Exchange':'🏛',
  'Business & Financial Times':'📰',
  'MyJoyOnline':'📡',
  'Citi Business News':'🎙',
  'Graphic Business':'🗞',
  'Pulse Ghana':'⚡',
  'BusinessDay':'🌍',
};

const SOURCE_URLS = {
  'Ghana Stock Exchange':'https://gse.com.gh/news-announcements/',
  'Business & Financial Times':'https://thebftonline.com',
  'MyJoyOnline':'https://myjoyonline.com/business',
  'Citi Business News':'https://citibusinessnews.com',
  'Graphic Business':'https://graphic.com.gh/business',
  'Pulse Ghana':'https://pulse.com.gh',
  'BusinessDay':'https://businessday.ng',
};

async function loadNews(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true; btn.textContent='↻ Loading…';

  // GSE-relevant keywords filter
  const GSE_KEYWORDS = [
    'gse','ghana stock','stock exchange','shares','dividend','ipo',
    'listing','equity','investor','securities','capital market',
    'mtn ghana','gcb','ecobank','calbank','access bank','goil',
    'ggbl','guinness ghana','total energies','kasapreko','republic bank',
    'enterprise group','bond','bank of ghana','sec ghana','interest rate',
    'market cap','trading session','annual report','earnings','profit',
    'loss','revenue','quarterly','rights issue','bourse','nairobi stock',
    'nigerian stock','west africa finance','african market'
  ];
  function isGSERelated(title,desc){
    const t=(title+' '+(desc||'')).toLowerCase();
    return GSE_KEYWORDS.some(k=>t.includes(k));
  }

  try{
    const res=await fetch('/api/news');
    const data=await res.json();
    // Filter to GSE-relevant only
    allArticles=(data.articles||[]).filter(a=>isGSERelated(a.title,a.description));

    // Hide sources strip
    document.getElementById('sources-strip').style.display='none';

    // Stats
    const statsEl=document.getElementById('stats-row');
    const t=data.fetched_at?new Date(data.fetched_at).toLocaleTimeString('en-GH',{hour:'2-digit',minute:'2-digit'}):'-';
    statsEl.innerHTML=`<span>${allArticles.length} GSE-related articles</span> · <span>Updated ${t}</span>`;

    // Category filters
    const cats=['All',...new Set(allArticles.map(a=>a.category).filter(Boolean))];
    const fb=document.getElementById('filter-bar');
    fb.innerHTML=cats.map(c=>`<button class="filter-chip ${c==='All'?'active':''}" onclick="filterNews('${c}',this)">${c}</button>`).join('');

    renderNews();
  }catch(err){
    document.getElementById('news-grid').innerHTML=`<div class="panel" style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-dim);">
      <div style="font-size:24px;margin-bottom:12px;">📡</div>
      Could not load news right now. Please try again later.
    </div>`;
  }
  btn.disabled=false; btn.textContent='↻ Refresh';
}

function filterNews(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderNews();
}

function renderNews(){
  const filtered=activeCat==='All'||activeCat==='all'
    ?allArticles
    :allArticles.filter(a=>a.category===activeCat||a.source===activeCat);

  const grid=document.getElementById('news-grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="panel" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);">No GSE articles found for this category.</div>`;
    return;
  }

  grid.innerHTML=filtered.map((a,i)=>{
    // Clean title — skip articles where title looks like a URL
    const title = a.title || '';
    if(title.startsWith('http') || title.length < 10) return '';
    if(i===0) return `
      <a class="news-card featured" href="${a.link||'#'}" target="_blank" rel="noopener">
        <div class="fc-text">
          <span class="news-cat">${a.category||'News'}</span>
          <h3>${title}</h3>
          <p>${a.description||''}</p>
          <div class="news-meta">
            <span>${a.date}</span>
          </div>
        </div>
        <div class="fc-icon">📰</div>
      </a>`;
    return `
      <a class="news-card" href="${a.link||'#'}" target="_blank" rel="noopener">
        <span class="news-cat">${a.category||'News'}</span>
        <h3>${title}</h3>
        <p>${a.description||''}</p>
        <div class="news-meta">
          <span>${a.date}</span>
        </div>
      </a>`;
  }).filter(Boolean).join('');
}

loadNews();
</script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/sw.js')
          .then(r=>console.log('[PWA] SW registered:', r.scope))
          .catch(e=>console.log('[PWA] SW error:', e));
      });
    }
  </script>
</body></html>
